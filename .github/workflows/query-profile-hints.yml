name: Query Profile Hints

on:
  push:
  pull_request:

jobs:
  query-profile-hints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run S29 query profile hint suite
        shell: bash
        run: bash scripts/run-s29-query-profile-hints.sh
      - name: Upload S29 query profile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: s29-query-profile-hints
          path: |
            project_plan/reports/s29_query_profile_hints.log
            project_plan/reports/s29_query_profile_report.json
            project_plan/reports/s29_benchmark_latency_profile.json
            project_plan/reports/s29_benchmark_recall_profile.json
