name: SQL V2 And API Migrations

on:
  push:
  pull_request:

jobs:
  sql-v2-api-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run S31 SQL v2 and API migration suite
        shell: bash
        run: bash scripts/run-s31-sql-v2-and-api-migrations.sh
      - name: Upload S31 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: s31-sql-v2-api-migrations
          path: |
            project_plan/reports/s31_quality_gates.log
            project_plan/reports/s31_sql_v2_migration.log
            project_plan/reports/s31_sql_v2_migration_report.json
            project_plan/reports/s31_benchmark_search_v2.json
            project_plan/reports/s31_competitor_gap_analysis.md
