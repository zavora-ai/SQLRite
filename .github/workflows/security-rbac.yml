name: Security RBAC

on:
  push:
  pull_request:

jobs:
  security-rbac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run S27 security RBAC smoke suite
        shell: bash
        run: bash scripts/run-s27-security-rbac-smoke.sh
      - name: Upload S27 security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: s27-security-rbac
          path: |
            project_plan/reports/s27_security_rbac_smoke.log
            project_plan/reports/s27_security_rbac_report.json
            project_plan/reports/s27_security_audit.jsonl
            project_plan/reports/s27_rbac_policy.json
