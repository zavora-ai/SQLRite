name: performance-phase7-hybrid-planner

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  phase7-hybrid-planner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run Phase 7 hybrid planner suite
        run: bash scripts/run-p7-hybrid-planner-suite.sh
