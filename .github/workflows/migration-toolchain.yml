name: Migration Toolchain

on:
  push:
  pull_request:

jobs:
  migration-toolchain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run S30 migration suite
        shell: bash
        run: bash scripts/run-s30-migration-suite.sh
      - name: Upload S30 migration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: s30-migration-toolchain
          path: |
            project_plan/reports/s30_quality_gates.log
            project_plan/reports/s30_migration_suite.log
            project_plan/reports/s30_migration_report.json
            project_plan/reports/s30_benchmark_migration.json
