name: Python SDK

on:
  push:
  pull_request:

jobs:
  python-sdk-ci:
    name: Python SDK (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sqlrite binary
        shell: bash
        run: cargo build --bin sqlrite
      - name: Run Python SDK integration + package smoke
        shell: bash
        run: bash scripts/run-s23-python-sdk-smoke.sh
      - name: Upload Python SDK dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist-${{ matrix.os }}
          path: project_plan/reports/s23_python_dist/*
