name: Release Bootstrap

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-sqlrite-artifacts:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --bin sqlrite

      - name: Upload Linux/macOS artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sqlrite-${{ runner.os }}-${{ runner.arch }}
          path: target/release/sqlrite

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: sqlrite-${{ runner.os }}-${{ runner.arch }}
          path: target/release/sqlrite.exe
