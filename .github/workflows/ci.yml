name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt
        run: cargo fmt --all --check
      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Rust test
        run: cargo test
      - name: Unified CLI smoke test
        run: |
          cargo run -- --help
          cargo run -- init --db ci_smoke.db --seed-demo --profile balanced --index-mode brute_force
          cargo run -- query --db ci_smoke.db --text "local agent memory" --top-k 2
          cargo run -- doctor --db ci_smoke.db
          cargo run -- quickstart \
            --db ci_quickstart.db \
            --runs 5 \
            --max-median-ms 180000 \
            --min-success-rate 0.95 \
            --json \
            --output quickstart_ci.json

      - name: Upload quickstart report
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ci-report
          path: quickstart_ci.json

  benchmark-gate:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run quick benchmark matrix
        run: |
          cargo run --bin sqlrite-bench-matrix -- \
            --profile quick \
            --durability balanced \
            --output bench_matrix_quick_ci.json
      - name: Assert benchmark thresholds
        run: |
          cargo run --bin sqlrite-bench-assert -- \
            --matrix bench_matrix_quick_ci.json \
            --scenario "weighted + brute_force" \
            --scenario "weighted + lsh_ann" \
            --min-qps 40 \
            --max-p95-ms 45 \
            --min-top1 0.99 \
            --min-ingest-cps 3000
