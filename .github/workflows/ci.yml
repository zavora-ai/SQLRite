name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust fmt
        run: cargo fmt --all --check
      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Rust test
        run: cargo test
      - name: Unified CLI smoke test
        run: |
          cargo run -- --help
          cargo run -- init --db ci_smoke.db --seed-demo --profile balanced --index-mode brute_force
          cargo run -- query --db ci_smoke.db --text "local agent memory" --top-k 2
          cargo run -- doctor --db ci_smoke.db
          cargo run -- quickstart \
            --db ci_quickstart.db \
            --runs 5 \
            --max-median-ms 180000 \
            --min-success-rate 0.95 \
            --json \
            --output quickstart_ci.json

      - name: Upload quickstart report
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-ci-report
          path: quickstart_ci.json

  benchmark-gate:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run quick benchmark matrix
        run: |
          cargo run --bin sqlrite-bench-matrix -- \
            --profile quick \
            --durability balanced \
            --output bench_matrix_quick_ci.json
      - name: Assert benchmark thresholds
        run: |
          cargo run --bin sqlrite-bench-assert -- \
            --matrix bench_matrix_quick_ci.json \
            --scenario "weighted + brute_force" \
            --scenario "weighted + lsh_ann" \
            --min-qps 40 \
            --max-p95-ms 45 \
            --min-top1 0.99 \
            --min-ingest-cps 3000

  benchmark-smoke-os-matrix:
    name: Benchmark smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run quick benchmark smoke
        shell: bash
        run: |
          cargo run --bin sqlrite-bench -- \
            --corpus 2000 \
            --queries 120 \
            --warmup 30 \
            --concurrency 2 \
            --embedding-dim 64 \
            --candidate-limit 300 \
            --batch-size 256 \
            --index-mode brute_force \
            --durability balanced \
            --output bench_smoke_${{ runner.os }}.json
      - name: Upload benchmark smoke report
        uses: actions/upload-artifact@v4
        with:
          name: bench-smoke-${{ matrix.os }}
          path: bench_smoke_${{ runner.os }}.json

  target-check-matrix:
    name: Target check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Cargo check target
        run: cargo check --target ${{ matrix.target }} --all-targets --all-features
