name: TypeScript SDK

on:
  push:
  pull_request:

jobs:
  typescript-sdk-matrix:
    name: TypeScript SDK (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build sqlrite binary
        run: cargo build --bin sqlrite
      - name: Install TypeScript SDK deps
        working-directory: sdk/typescript
        run: npm install
      - name: Run TypeScript SDK tests
        working-directory: sdk/typescript
        run: npm test
      - name: Pack TypeScript SDK
        run: |
          node -e "require('fs').mkdirSync('project_plan/reports/s24_typescript_dist',{recursive:true})"
          npm --prefix sdk/typescript pack --pack-destination project_plan/reports/s24_typescript_dist
      - name: Upload TypeScript SDK package
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk-${{ matrix.os }}
          path: project_plan/reports/s24_typescript_dist/*
