name: Performance P0 P1

on:
  push:
  pull_request:

jobs:
  performance-p0-p1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run P0/P1 performance suite
        shell: bash
        run: bash scripts/run-p0-p1-performance-suite.sh
      - name: Upload P0/P1 performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: p0-p1-performance
          path: |
            project_plan/reports/p0_p1_quality_gates.log
            project_plan/reports/p0_p1_sidecar_suite.log
            project_plan/reports/p0_p1_benchmark_bruteforce.json
            project_plan/reports/p0_p1_benchmark_hnsw.json
            project_plan/reports/p0_p1_summary.json
            project_plan/reports/P0_P1.md
