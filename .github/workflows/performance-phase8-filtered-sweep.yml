name: performance-phase8-filtered-sweep

on:
  workflow_dispatch:
  push:
    paths:
      - "src/bench.rs"
      - "src/main.rs"
      - "src/bin/sqlrite-bench.rs"
      - "src/bin/sqlrite-bench-suite.rs"
      - "src/bin/sqlrite-bench-matrix.rs"
      - "scripts/run-p8-filtered-sweep-suite.sh"
      - ".github/workflows/performance-phase8-filtered-sweep.yml"

jobs:
  filtered-sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run filtered sweep suite
        run: bash scripts/run-p8-filtered-sweep-suite.sh
