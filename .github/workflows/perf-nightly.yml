name: Performance Nightly

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  bench-10k:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run 10k benchmark matrix
        run: |
          cargo run --bin sqlrite-bench-matrix -- \
            --profile 10k \
            --durability balanced \
            --output bench_matrix_10k_nightly.json
      - name: Assert 10k thresholds
        run: |
          cargo run --bin sqlrite-bench-assert -- \
            --matrix bench_matrix_10k_nightly.json \
            --scenario "weighted + brute_force" \
            --scenario "weighted + lsh_ann" \
            --min-qps 70 \
            --max-p95-ms 20 \
            --min-top1 0.99 \
            --min-ingest-cps 5000 \
            --max-working-set-bytes 16000000
      - name: Upload 10k report
        uses: actions/upload-artifact@v4
        with:
          name: bench-matrix-10k-nightly
          path: bench_matrix_10k_nightly.json

  bench-100k:
    runs-on: ubuntu-latest
    needs: bench-10k
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run 100k benchmark matrix
        run: |
          cargo run --bin sqlrite-bench-matrix -- \
            --profile 100k \
            --durability balanced \
            --output bench_matrix_100k_nightly.json
      - name: Assert 100k thresholds
        run: |
          cargo run --bin sqlrite-bench-assert -- \
            --matrix bench_matrix_100k_nightly.json \
            --scenario "weighted + brute_force" \
            --scenario "weighted + lsh_ann" \
            --min-qps 8 \
            --max-p95-ms 140 \
            --min-top1 0.99 \
            --min-ingest-cps 8000 \
            --max-working-set-bytes 240000000
      - name: Upload 100k report
        uses: actions/upload-artifact@v4
        with:
          name: bench-matrix-100k-nightly
          path: bench_matrix_100k_nightly.json

  bench-suite:
    runs-on: ubuntu-latest
    needs: bench-100k
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run reproducible benchmark/eval suite
        shell: bash
        run: |
          PROFILES="10k,100k"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            PROFILES="10k,100k,1m"
          fi
          cargo run --bin sqlrite-bench-suite -- \
            --profiles "$PROFILES" \
            --concurrency-profile 10k \
            --concurrency-levels 1,2,4,8 \
            --dataset examples/eval_dataset.json \
            --dataset-id examples/eval_dataset.json \
            --embedding-model deterministic-local-v1 \
            --hardware-class gh-ubuntu-latest-x86_64 \
            --durability balanced \
            --output bench_suite_nightly.json
      - name: Upload suite report
        uses: actions/upload-artifact@v4
        with:
          name: bench-suite-nightly
          path: bench_suite_nightly.json

  bench-1m-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: bench-suite
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run 1m benchmark matrix
        run: |
          cargo run --bin sqlrite-bench-matrix -- \
            --profile 1m \
            --durability balanced \
            --output bench_matrix_1m_dispatch.json
      - name: Upload 1m report
        uses: actions/upload-artifact@v4
        with:
          name: bench-matrix-1m-dispatch
          path: bench_matrix_1m_dispatch.json

  phase-c-bundle-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: bench-1m-dispatch
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run phase-c benchmark bundle
        run: |
          bash scripts/run-benchmark-bundle.sh \
            --output-dir s13_bundle_ci \
            --profiles 100k,1m \
            --concurrency-profile 100k \
            --concurrency-levels 1,2,4 \
            --dataset examples/eval_dataset.json \
            --dataset-id examples/eval_dataset.json \
            --embedding-model deterministic-local-v1 \
            --hardware-class gh-ubuntu-latest-x86_64 \
            --durability balanced \
            --strict-phase-c-gate
      - name: Upload phase-c bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase-c-benchmark-bundle-dispatch
          path: s13_bundle_ci/*
